name: CI

on:
  push:
    branches: [main, production-hardening]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: ruff check
        run: ruff check app tests

  test:
    name: Test (pytest + coverage gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: leadpulse
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: leadpulse_test
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job runs.
        options: >-
          --health-cmd "pg_isready -U leadpulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Components are the source of truth; config derives DATABASE_URL/REDIS_URL.
      APP_ENV: development
      JWT_SECRET_KEY: ci-only-secret-not-for-production
      POSTGRES_USER: leadpulse
      POSTGRES_PASSWORD: testpw
      POSTGRES_DB: leadpulse_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      TEST_DATABASE_URL: postgresql+psycopg2://leadpulse:testpw@localhost:5432/leadpulse_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Verify migrations apply cleanly (and match models)
        run: |
          alembic upgrade head
          # Drift guard: autogenerate must produce no schema operations.
          alembic revision --autogenerate -m _drift_probe
          probe=$(ls -t migrations/versions/*_drift_probe.py | head -1)
          if grep -qE "op\.(create|drop|add|alter)_" "$probe"; then
            echo "::error::Model/migration drift detected"; cat "$probe"; exit 1
          fi
          rm -f "$probe"
          echo "Migrations match models — no drift."
      - name: Run tests with coverage gate (80%)
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/docker/Dockerfile
          push: false
          tags: leadpulse-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
