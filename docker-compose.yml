# LeadPulse local/staging orchestration.
# Connectivity fix: services set POSTGRES_HOST/REDIS_HOST to the compose
# service names and blank DATABASE_URL/REDIS_URL so config.py derives the
# correct in-network URLs (the .env defaults to localhost for native dev).
# Healthchecks + depends_on: service_healthy ensure ordered, ready startup.

services:

  postgres:
    image: postgres:15
    container_name: leadpulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-leadpulse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-leadpulse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not published by default; uncomment to inspect locally on a free port.
    # ports:
    #   - "15432:5432"

  redis:
    image: redis:7
    container_name: leadpulse_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: leadpulse_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override localhost defaults with in-network service names.
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: ""   # force derivation from components
      REDIS_URL: ""
      RUN_MIGRATIONS: "true"   # API container owns migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/live').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: leadpulse_worker
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app.celery", "worker", "--loglevel=info", "--concurrency=4"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: ""
      REDIS_URL: ""
      RUN_MIGRATIONS: "false"   # workers wait for schema, never drive it
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: leadpulse_beat
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app.celery", "beat", "--loglevel=info"]
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: ""
      REDIS_URL: ""
      RUN_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
